# President History GUI configuration (split from main_gui.yml)

gui:
  president_history:
    title: "§5§l📜 PRESIDENT HISTORY 📜"
    inventory_slot: 54
    items:
      # Header / Overview (Slot 4)
      header_item:
        gui_slot: 4
        material: ENCHANTED_BOOK
        custom_model_data: 0
        display_name: "§5§l📜 Presidential Records"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Total presidents recorded: §f{total}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Click any president entry"
          - "§7to view their full record."
        click_sound: "item.book.page_turn"

      # Hall of Fame – Best Approval (Slot 47)
      hall_approval:
        gui_slot: 47
        material: NETHER_STAR
        custom_model_data: 0
        display_name: "§e§l⭐ Best Approval Rating"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7President: §f{best_approval_name}"
          - "§eRating: §f{best_approval}/5.0"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Hall of Fame record"
        click_sound: "entity.player.levelup"

      # Hall of Fame – Longest Term (Slot 49)
      hall_longest_term:
        gui_slot: 49
        material: CLOCK
        custom_model_data: 0
        display_name: "§a§l⏳ Longest Term"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7President: §f{longest_term_name}"
          - "§aDuration: §f{longest_term_days} days"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Hall of Fame record"
        click_sound: "block.note_block.pling"

      # Hall of Fame – Most Orders (Slot 51)
      hall_most_orders:
        gui_slot: 51
        material: WRITABLE_BOOK
        custom_model_data: 0
        display_name: "§c§l📜 Most Executive Orders"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7President: §f{most_orders_name}"
          - "§cOrders: §f{most_orders}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Hall of Fame record"
        click_sound: "item.book.page_turn"

      # Back Button (Slot 45)
      back_button:
        gui_slot: 45
        material: ARROW
        custom_model_data: 0
        display_name: "§7§l← Back"
        lore:
          - "§7Return to Government Menu"
        click_sound: "ui.button.click"
        on_click: "<open_gui_government>"

      # Close Button (Slot 53)
      close_button:
        gui_slot: 53
        material: BARRIER
        custom_model_data: 0
        display_name: "§c§lClose"
        lore:
          - "§7Click to close"
        click_sound: "block.chest.close"
        on_click: "<action_close_inventory>"


  # ========================================
  # President Record Detail GUI Configuration
  # ========================================
  president_history_detail:
    title: "§d§l🏛 PRESIDENT RECORD 🏛"
    inventory_slot: 54
    items:
      # Term Information (Slot 10)
      term_info:
        gui_slot: 10
        material: CLOCK
        custom_model_data: 0
        display_name: "§a§l⏳ Term Information"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Start Date: §f{term_start}"
          - "§7End Date:   §f{term_end}"
          - "§7Duration:   §f{term_duration}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"

      # Approval Rating (Slot 12)
      approval_rating:
        gui_slot: 12
        material: NETHER_STAR
        custom_model_data: 0
        display_name: "§e§l⭐ Approval Rating"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Rating: §e{approval}/5.0"
          - "§7Stars:  {star_bar}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"

      # Executive Orders (Slot 14)
      executive_orders:
        gui_slot: 14
        material: WRITABLE_BOOK
        custom_model_data: 0
        display_name: "§c§l📜 Executive Orders"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Orders Issued: §f{orders}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"

      # Arena Games (Slot 16)
      arena_games:
        gui_slot: 16
        material: IRON_SWORD
        custom_model_data: 0
        hide_attributes: ALL
        display_name: "§4§l⚔ Presidential Arena"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Games Hosted: §f{games}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"

      # Cabinet Members (Slot 20)
      cabinet_members:
        gui_slot: 20
        material: LECTERN
        custom_model_data: 0
        display_name: "§e§l🎖 Cabinet Members"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "{cabinet_list}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"

      # Accomplishments (Slot 22)
      accomplishments:
        gui_slot: 22
        material: GOLDEN_APPLE
        custom_model_data: 0
        display_name: "§6§l🏆 Accomplishments"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "{accomplishments_list}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"

      # End of Term (Slot 24)
      end_of_term:
        gui_slot: 24
        material: LIME_CONCRETE
        custom_model_data: 0
        display_name: "§c§l🚩 End of Term"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Reason: {end_reason}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"

      # Back to List Button (Slot 45)
      back_to_list:
        gui_slot: 45
        material: ARROW
        custom_model_data: 0
        display_name: "§7§l← Back to List"
        lore:
          - "§7Return to history list"
        click_sound: "ui.button.click"
        on_click: "<open_gui_history>"

      # Close Button (Slot 53)
      close_button:
        gui_slot: 53
        material: BARRIER
        custom_model_data: 0
        display_name: "§c§lClose"
        lore:
          - "§7Click to close"
        click_sound: "block.chest.close"
        on_click: "<action_close_inventory>"



  # ========================================
  # Cabinet GUI Configuration
  # ========================================
  # Opened via: main menu cabinet button, government menu, or /dc gui open_gui_cabinet
  #
  # Available on_click actions for this GUI:
  #   <open_gui_cabinet>          - Opens the Cabinet overview
  #   <open_gui_cabinet_appoint>  - Opens the appointment picker (President only)
  #   <open_gui_government>       - Returns to Government Menu
  #   <open_gui_main_menu>        - Returns to Main Menu
  # ========================================
