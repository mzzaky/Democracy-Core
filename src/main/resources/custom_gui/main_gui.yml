# ========================================
# GUI Configuration for Democracy Core Plugin
# ========================================
#
# This file controls the appearance and behavior of GUI elements
# Each item supports the following properties:
#   - gui_slot: Position in inventory (0-53 for 54-slot GUI). Supports multiple slots (e.g. "4, 5, 6")
#   - material: Minecraft material name
#   - display_name: Item display name (supports color codes with §)
#   - lore: List of lore lines
#   - click_sound: Sound played when clicked
#   - on_click: Action to execute when clicked (see list below)
#   - hide_attributes: Hide item flags (see list below)
#
# Hide Attributes (hide_attributes):
#   Specify which item information to hide. Can be a single value or list:
#   - ALL               - Hide all item flags
#   - ENCHANTS          - Hide enchantments
#   - ATTRIBUTES        - Hide attribute modifiers (damage, speed, etc)
#   - UNBREAKABLE       - Hide unbreakable tag
#   - DESTROYS          - Hide "can destroy" tags
#   - PLACED_ON         - Hide "can be placed on" tags
#   - POTION_EFFECTS    - Hide potion effects
#   - DYE               - Hide dye information (leather armor)
#
#   Examples:
#     hide_attributes: ALL
#     hide_attributes: ENCHANTS
#     hide_attributes: [ENCHANTS, ATTRIBUTES]
#
# Placeholders (auto-replaced in display_name and lore):
#   Note: You can also use any PlaceholderAPI placeholders (e.g., %democracy_president%)
#   See .wiki/PLACEHOLDER_API.MD for a full list of available placeholders.
#
#   === PLAYER INFO ===
#   {player_name}           - Player's current username
#   {level}                 - Player's experience level (calculated from playtime)
#   {playtime}              - Total playtime formatted (e.g., "123h 45m")
#   {balance}               - Player's economy balance (formatted with commas)
#
#   === GOVERNMENT INFO ===
#   {president_name}        - Current president's name (or "No President")
#   {term}                  - Current presidential term number
#   {remaining_time}        - Time remaining in current term (formatted)
#   {rating}                - President's approval rating (0.0 - 5.0)
#
#   === ELECTION INFO ===
#   {phase}                 - Current election phase (Registration/Campaign/Voting/etc)
#   {election_details}      - Dynamic election info based on phase
#   {candidates}            - Number of registered candidates
#   {votes}                 - Total votes cast
#
#   === CABINET INFO ===
#   {cabinet_members}       - List of cabinet ministers and positions
#   {filled}                - Number of filled cabinet positions
#   {total}                 - Total number of cabinet positions (5)
#
#   === TREASURY INFO ===
#   {balance}               - Treasury current balance (formatted)
#   {income}                - Total treasury income (formatted)
#   {expenses}              - Total treasury expenses (formatted)
#
#   === ACTIVE EFFECTS INFO ===
#   {total}                 - Total active effects (executive orders + cabinet decisions)
#   {executive_orders}      - List of active executive orders
#   {cabinet_decisions}     - List of active cabinet decisions
#   {active_count}          - Number of active executive orders
#
#   === ARENA INFO ===
#   {kills}                 - Player's arena kills
#   {deaths}                - Player's arena deaths
#   {streak}                - Player's current kill streak
#   {players}               - Number of players currently in arena
#
#   === RECALL INFO ===
#   {phase}                 - Recall petition phase (Collecting/Voting/etc)
#   {signatures}            - Number of petition signatures
#   {voting_details}        - Voting statistics (if in voting phase)
#   {deposit}               - Required deposit amount (formatted)
#   {threshold}             - Required threshold percentage
#
#   === HISTORY INFO ===
#   {total}                 - Total number of past presidents
#   {recent_presidents}     - List of recent presidents with ratings
#
#   === PLAYER STATISTICS ===
#   {votes_cast}            - Number of times player has voted
#   {endorsements}          - Number of endorsements given by player
#   {president_times}       - Number of times served as president
#   {minister_times}        - Number of times served as minister/cabinet member
#
#   === REGISTRATION INFO ===
#   {cost}                  - Registration fee (formatted)
#   {current_rating}        - Current president's rating (for rate_president item)
#
#   === STATUS LINES ===
#   {status_lines}          - Dynamic status (shows if player is President/Minister)

#
# ========================================
# AVAILABLE GUI ACTIONS (on_click)
# ========================================
#
# === OPEN GUI ACTIONS ===
# <open_gui_main_menu>          - Opens Main Menu GUI
# <open_gui_player_stats>       - Opens Player Statistics GUI
# <open_gui_government>         - Opens Government GUI
# <open_gui_voting>             - Opens Voting/Election GUI
# <open_gui_cabinet>            - Opens Cabinet GUI
# <open_gui_treasury>           - Opens Treasury GUI
# <open_gui_executive_orders>   - Opens Executive Orders GUI
# <open_gui_recall>             - Opens Recall System GUI
# <open_gui_history>            - Opens Presidential History GUI
# <open_gui_leaderboard>        - Opens Leaderboard GUI
# <open_gui_help>               - Opens Help/Guide GUI
# <open_gui_arena>              - Opens Presidential Arena Management GUI
# <open_gui_arena_leaderboard>  - Opens Arena Leaderboard GUI
# <open_gui_arena_kit>          - Opens Arena Kit Info GUI
# <open_gui_cabinet_appoint>    - Opens Cabinet Appointment GUI (President only)
#
# === SPECIAL ACTIONS ===
# <action_register_candidate>   - Register as presidential candidate
# <action_rate_president>       - Show rating command message
# <action_close_inventory>      - Close inventory
# <action_arena_info>           - Show arena information
# <action_endorse_candidate>    - Show endorse command message
# <action_donate_treasury>      - Show donate command message
# <action_join_arena>           - Join presidential arena
# <action_arena_start>          - Start a new arena session (President only)
# <action_arena_end>            - End the current arena session (President only)
# <action_arena_leave>          - Leave the arena
# <action_refresh_gui>          - Reload/refresh current GUI
# <action_console_command>      - Execute console command (requires 'value' field)
#                                  Example:
#                                    on_click: "<action_console_command>"
#                                    value: "give %player_name% diamond 1"
# 
# 
# You can use multiple slots by separating them with a comma (e.g. gui_slot: "4, 5, 6")
# gui_slot:
#  - 11
#  - 22
# ========================================


gui:
  # Main Menu GUI Configuration
  main_menu:
    title: "§6§l⚜ DEMOCRACY CORE ⚜"
    # Custom GUI Size (9, 18, 27, 36, 45, 54)
    # Ensure all items fit within the chosen size!
    inventory_slot: 54
    items:
      # Player Head (Slot 4)
      player_head:
        gui_slot: 4
        material: PLAYER_HEAD
        custom_model_data: 0
        display_name: "§b§l👤 {player_name}"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Level: §f{level}"
          - "§7Playtime: §f{playtime}"
          - "§7Balance: §6{balance}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "{status_lines}"
          - ""
          - "§aClick for detailed statistics"
        click_sound: "entity.player.levelup"
        on_click: "<open_gui_player_stats>"

      # President Info (Slot 10)
      president_item:
        gui_slot: 10
        # When president exists
        default:
          material: GOLDEN_HELMET
          custom_model_data: 0
          hide_attributes: ATTRIBUTES
          display_name: "§6§l👑 PRESIDENT"
          lore:
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§7Name: §f{president_name}"
            - "§7Term §f{term}"
            - "§7Time remaining: §f{remaining_time}"
            - "§7Rating: §e{rating} ⭐"
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§aClick for government details"
          click_sound: "block.anvil.use"
          on_click: "<open_gui_government>"
        # When no president
        no_president:
          material: BARRIER
          custom_model_data: 0
          display_name: "§c§l👑 NO PRESIDENT"
          lore:
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§7President position is empty"
            - "§7Election is in progress"
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§eClick for election info"
          click_sound: "block.anvil.break"
          on_click: "<open_gui_voting>"

      # Cabinet Info (Slot 12)
      cabinet_item:
        gui_slot: 12
        material: LECTERN
        custom_model_data: 0
        display_name: "§e§l📋 CABINET"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "{cabinet_members}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Filled: §f{filled}/{total}"
          - ""
          - "§aClick for cabinet details"
        click_sound: "item.book.page_turn"
        on_click: "<open_gui_cabinet>"

      # Treasury Info (Slot 14)
      treasury_item:
        gui_slot: 14
        material: GOLD_BLOCK
        custom_model_data: 0
        display_name: "§6§l💰 TREASURY"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Balance: §6{balance}"
          - "§7Income: §a+{income}"
          - "§7Expenses: §c-{expenses}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§aClick for treasury details"
        click_sound: "block.note_block.pling"
        on_click: "<open_gui_treasury>"

      # Active Effects (Slot 16)
      active_effects_item:
        gui_slot: 16
        # When no effects
        inactive:
          material: GLASS
          custom_model_data: 0
          display_name: "§a§l✨ ACTIVE EFFECTS: {total}"
          lore:
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§7No active effects"
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          click_sound: "block.glass.break"
          on_click: "<open_gui_executive_orders>"
        # When effects active
        active:
          material: BEACON
          custom_model_data: 0
          display_name: "§a§l✨ ACTIVE EFFECTS: {total}"
          lore:
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "{executive_orders}"
            - "{cabinet_decisions}"
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          click_sound: "block.beacon.activate"
          on_click: "<open_gui_executive_orders>"

      # Election (Slot 19)
      election_item:
        gui_slot: 19
        material: PAPER
        custom_model_data: 0
        display_name: "§b§l🗳 ELECTION"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Phase: §f{phase}"
          - "{election_details}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§aClick to open voting GUI"
        click_sound: "item.book.page_turn"
        on_click: "<open_gui_voting>"

      # Executive Orders (Slot 21)
      executive_orders_item:
        gui_slot: 21
        material: WRITABLE_BOOK
        custom_model_data: 0
        display_name: "§c§l📜 EXECUTIVE ORDERS"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Active: §f{active_count} orders"
          - "§7Cost: §6{cost}"
          - "§7Cooldown: §f{cooldown}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "{president_permission}"
          - ""
          - "§aClick to view orders"
        click_sound: "item.book.page_turn"
        on_click: "<open_gui_executive_orders>"

      # Presidential Arena (Slot 23)
      arena_item:
        gui_slot: 23
        # When inactive
        inactive:
          material: IRON_SWORD
          custom_model_data: 0
          hide_attributes: ALL
          display_name: "§4§l⚔ PRESIDENTIAL ARENA"
          lore:
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§7Status: §cInactive"
            - ""
            - "§7§lYour Statistics:"
            - "§7Kills: §a{kills}"
            - "§7Deaths: §c{deaths}"
            - "§7Best Streak: §6{streak}"
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§aClick to open Arena Manager"
          click_sound: "entity.player.attack.sweep"
          on_click: "<open_gui_arena>"
        # When active
        active:
          material: DIAMOND_SWORD
          custom_model_data: 0
          hide_attributes: ALL
          display_name: "§4§l⚔ PRESIDENTIAL ARENA"
          lore:
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§a§lACTIVE SESSION!"
            - "§7Players in arena: §f{players}"
            - ""
            - "§7§lYour Statistics:"
            - "§7Kills: §a{kills}"
            - "§7Deaths: §c{deaths}"
            - "§7Best Streak: §6{streak}"
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§aClick to open Arena Manager"
          click_sound: "entity.player.attack.crit"
          on_click: "<open_gui_arena>"

      # Recall System (Slot 25)
      recall_item:
        gui_slot: 25
        # When inactive
        inactive:
          material: TORCH
          custom_model_data: 0
          display_name: "§c§l⚠ RECALL SYSTEM"
          lore:
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§7No active petition"
            - ""
            - "§7Start petition to"
            - "§7recall president"
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§7Deposit: §6{deposit}"
            - "§7Threshold: §f{threshold}"
            - ""
            - "§eClick for recall info"
          click_sound: "block.torch.extinguish"
          on_click: "<open_gui_recall>"
        # When active
        active:
          material: REDSTONE_TORCH
          custom_model_data: 0
          display_name: "§c§l⚠ RECALL SYSTEM"
          lore:
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§c§lACTIVE PETITION!"
            - "§7Phase: §f{phase}"
            - "§7Signatures: §f{signatures}"
            - "{voting_details}"
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§7Deposit: §6{deposit}"
            - "§7Threshold: §f{threshold}"
            - ""
            - "§eClick for recall info"
          click_sound: "block.redstone_torch.burnout"
          on_click: "<open_gui_recall>"

      # History (Slot 28)
      history_item:
        gui_slot: 28
        material: BOOK
        custom_model_data: 0
        display_name: "§5§l📚 PRESIDENTIAL HISTORY"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Total presidents: §f{total}"
          - "{recent_presidents}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§aClick to view history"
        click_sound: "item.book.page_turn"
        on_click: "<open_gui_history>"

      # My Stats (Slot 30)
      my_stats_item:
        gui_slot: 30
        material: COMPASS
        custom_model_data: 0
        display_name: "§b§l📊 MY STATISTICS"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Votes Cast: §f{votes_cast}"
          - "§7Endorsements: §f{endorsements}"
          - "§7Times President: §f{president_times}x"
          - "§7Times Minister: §f{minister_times}x"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§aClick for full details"
        click_sound: "item.spyglass.use"
        on_click: "<open_gui_player_stats>"

      # Leaderboard (Slot 32)
      leaderboard_item:
        gui_slot: 32
        material: GOLDEN_APPLE
        custom_model_data: 0
        display_name: "§6§l🏆 LEADERBOARD"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7View top players:"
          - "§7- Arena Kills"
          - "§7- Playtime"
          - "§7- Best Presidents"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§aClick to view leaderboard"
        click_sound: "entity.player.levelup"
        on_click: "<open_gui_leaderboard>"

      # Help (Slot 34)
      help_item:
        gui_slot: 34
        material: KNOWLEDGE_BOOK
        custom_model_data: 0
        display_name: "§a§l❓ GUIDE & HELP"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Learn how to play:"
          - "§7- Election System"
          - "§7- Becoming President"
          - "§7- Cabinet & Ministers"
          - "§7- Executive Orders"
          - "§7- And more!"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§aClick to open guide"
        click_sound: "item.book.page_turn"
        on_click: "<open_gui_help>"

      # Quick Actions
      register_candidate:
        gui_slot: 38
        material: EMERALD
        custom_model_data: 0
        display_name: "§a§l📝 REGISTER CANDIDATE"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Requirements:"
          - "{req_level}"
          - "{req_playtime}"
          - "{req_balance}"
          - ""
          - "§7Registration Cost: §6{cost}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§aClick to register!"
        click_sound: "entity.experience_orb.pickup"
        on_click: "<action_register_candidate>"

      vote_now:
        gui_slot: 40
        material: LIME_CONCRETE
        custom_model_data: 0
        display_name: "§a§l🗳 VOTE NOW!"
        lore:
          - "§7Cast your vote"
          - "§7for your chosen candidate!"
          - ""
          - "§c⚠ Cannot be undone!"
          - ""
          - "§aClick to vote!"
        click_sound: "ui.button.click"
        on_click: "<open_gui_voting>"

      rate_president:
        gui_slot: 42
        material: NETHER_STAR
        custom_model_data: 0
        display_name: "§e§l⭐ RATE PRESIDENT"
        lore:
          - "§7Give a rating for"
          - "§7current president's performance"
          - ""
          - "§7Current rating: §e{current_rating}/5.0"
          - ""
          - "§eClick to rate!"
        click_sound: "entity.firework_rocket.launch"
        on_click: "<action_rate_president>"

      # Close Button (Slot 49)
      close_button:
        gui_slot: 49
        material: BARRIER
        custom_model_data: 0
        display_name: "§c§lClose Menu"
        lore:
          - "§7Click to close"
        click_sound: "block.chest.close"
        on_click: "<action_close_inventory>"

      # Global Tax System (Slot 37)
      tax_item:
        gui_slot: 22
        material: SUNFLOWER
        custom_model_data: 0
        display_name: "§e§l💲 GLOBAL TAX"
        lore:
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§7Tax Amount: §6{tax_amount}"
          - "§7Next Collection: §f{next_collection}"
          - "§7Your Debt: {debt_status}"
          - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
          - "§aClick to open tax menu"
        click_sound: "block.note_block.pling"
        on_click: "<open_gui_tax>"

      # Glass Pane Filler
      glass_pane:
        material: AIR
        custom_model_data: 0
        display_name: " "

      # Corner Decorations
      corner_decoration:
        material: AIR
        custom_model_data: 0
        display_name: " "

      # ========================================
      # CUSTOM ITEMS — NO JAVA CODE NEEDED!
      # ========================================
      # Add any custom item below and it will automatically
      # appear in the main menu without editing any Java files.
      #
      # Required fields:
      #   gui_slot     - Inventory slot (0-53). Must be an EMPTY slot.
      #   material     - Minecraft material name (e.g. DIAMOND, EMERALD)
      #   display_name - Item name (supports § color codes)
      #
      # Optional fields:
      #   lore             - List of lore lines
      #   custom_model_data - Custom model data integer
      #   hide_attributes  - ALL, ENCHANTS, ATTRIBUTES, etc.
      #   click_sound      - Sound key (e.g. "ui.button.click")
      #   on_click         - Any action from the list at the top of this file
      #                      e.g. "<open_gui_government>", "<action_close_inventory>"
      #                      or   "<action_console_command>" with a "value:" field
      #
      # Example (remove the leading # to activate):
      # my_custom_item:
      #   gui_slot: 44
      #   material: DIAMOND
      #   custom_model_data: 0
      #   display_name: "§b§l💎 Custom Item"
      #   lore:
      #     - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      #     - "§7This is a custom item!"
      #     - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      #     - "§aClick to open government"
      #   click_sound: "entity.player.levelup"
      #   on_click: "<open_gui_government>"
      #
      # Console command example:
      # my_command_item:
      #   gui_slot: 45
      #   material: COMMAND_BLOCK
      #   custom_model_data: 0
      #   display_name: "§c§l⚡ Run Command"
      #   lore:
      #     - "§7Runs a command as console"
      #   click_sound: "ui.button.click"
      #   on_click: "<action_console_command>"
      #   value: "say Hello {player_name}!"
      # ========================================