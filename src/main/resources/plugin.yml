name: DemocracyCore
version: 1.2.0
main: id.democracycore.DemocracyCore
api-version: '1.21'
description: A comprehensive democracy and government simulation plugin
author: DemocracyCore Team
softdepend:
  - Vault

commands:
  democracycore:
    description: Main command for Democracy Core plugin
    usage: /democracycore [subcommand]
    aliases: [dc, democracy, gov]

permissions:
  democracy.vote:
    description: Allows voting in elections
    default: true
  democracy.register:
    description: Allows registering as a candidate
    default: true
  democracy.endorse:
    description: Allows endorsing candidates
    default: true
  democracy.donate:
    description: Allows donating to treasury
    default: true
  democracy.president:
    description: President-only commands
    default: false
  democracy.cabinet:
    description: Cabinet member commands
    default: false
  democracy.admin:
    description: Admin commands
    default: op
