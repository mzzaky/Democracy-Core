          click_sound: "block.redstone_torch.burnout"
          on_click: "<open_gui_recall>"

      # History (Slot 28)
      history_item:
        gui_slot: 28
        material: BOOK
        custom_model_data: 0
        display_name: "§5§l📚 PRESIDENTIAL HISTORY"
        lore:
