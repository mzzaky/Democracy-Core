            - "§aClick for government details"
          click_sound: "block.anvil.use"
          on_click: "<open_gui_government>"
        # When no president
        no_president:
          material: BARRIER
          custom_model_data: 0
          display_name: "§c§l👑 NO PRESIDENT"
          lore:
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§7President position is empty"
            - "§7Election is in progress"
            - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
            - "§eClick for election info"
          click_sound: "block.anvil.break"
