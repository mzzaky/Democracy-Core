# ========================================
# ADMIN COMMANDS
# ========================================
# These configurations document admin-accessible GUI shortcuts.
# Use /dc gui <action> (requires democracy.admin permission) to open
# any GUI directly, bypassing normal navigation.
#
# Format:  /dc gui <action_key>
#
# Available GUI actions (action_key values):
#   open_gui_main_menu        - Main Menu
#   open_gui_government       - Government Menu
#   open_gui_history          - President History
#   open_gui_voting           - Voting / Election
#   open_gui_cabinet          - Cabinet Menu                 ← Also updated
#   open_gui_cabinet_appoint  - Cabinet Appointment Picker   ← New
#   open_gui_treasury         - Treasury
#   open_gui_executive_orders - Executive Orders
#   open_gui_recall           - Recall System
#   open_gui_leaderboard      - Leaderboard
#   open_gui_player_stats     - Player Statistics
#   open_gui_help             - Guide & Help
#   open_gui_tax              - Tax System
#   open_gui_arena            - Presidential Arena Manager  ← New
#   open_gui_arena_leaderboard- Arena Leaderboard           ← New
#   open_gui_arena_kit        - Arena Kit Info              ← New
# ========================================
admin_commands:
  # Admin shortcut: Open President History GUI for any player
  history:
    permission: "democracy.admin"
    description: "Opens the President History GUI. Usage: /dc gui open_gui_history"
    on_click: "<open_gui_history>"

  # Admin shortcut: Open Cabinet GUI
  cabinet:
    permission: "democracy.admin"
    description: "Opens the Cabinet GUI. Usage: /dc gui open_gui_cabinet"
    on_click: "<open_gui_cabinet>"

  # Admin shortcut: Open Arena Manager GUI
  arena:
    permission: "democracy.admin"
    description: "Opens the Arena Management GUI. Usage: /dc gui open_gui_arena"
    on_click: "<open_gui_arena>"

  # Admin shortcut: Open Arena Leaderboard GUI
  arena_leaderboard:
    permission: "democracy.admin"
    description: "Opens the Arena Leaderboard GUI. Usage: /dc gui open_gui_arena_leaderboard"
    on_click: "<open_gui_arena_leaderboard>"
