      # ========================================
      # CUSTOM ITEMS — NO JAVA CODE NEEDED!
      # ========================================
      # Add any custom item below and it will automatically
      # appear in the main menu without editing any Java files.
      #
      # Required fields:
      #   gui_slot     - Inventory slot (0-53). Must be an EMPTY slot.
      #   material     - Minecraft material name (e.g. DIAMOND, EMERALD)
      #   display_name - Item name (supports § color codes)
      #
      # Optional fields:
      #   lore             - List of lore lines
      #   custom_model_data - Custom model data integer
      #   hide_attributes  - ALL, ENCHANTS, ATTRIBUTES, etc.
      #   click_sound      - Sound key (e.g. "ui.button.click")
      #   on_click         - Any action from the list at the top of this file
      #                      e.g. "<open_gui_government>", "<action_close_inventory>"
      #                      or   "<action_console_command>" with a "value:" field
      #
      # Example (remove the leading # to activate):
      # my_custom_item:
      #   gui_slot: 44
      #   material: DIAMOND
      #   custom_model_data: 0
      #   display_name: "§b§l💎 Custom Item"
      #   lore:
      #     - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      #     - "§7This is a custom item!"
      #     - "§8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"
      #     - "§aClick to open government"
      #   click_sound: "entity.player.levelup"
      #   on_click: "<open_gui_government>"
      #
      # Console command example:
      # my_command_item:
      #   gui_slot: 45
      #   material: COMMAND_BLOCK
      #   custom_model_data: 0
      #   display_name: "§c§l⚡ Run Command"
      #   lore:
      #     - "§7Runs a command as console"
      #   click_sound: "ui.button.click"
      #   on_click: "<action_console_command>"
      #   value: "say Hello {player_name}!"
      # ========================================



  # ========================================
  # President History GUI Configuration
  # ========================================
  # Opened via: clicking 'Presidential History' in the Main Menu or Government Menu,
  #             or via the admin command listed under admin_commands below.
  #
